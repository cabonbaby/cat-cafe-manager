<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>貓咪咖啡店店長</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Cozy Web Game Demo</p>
        <h1>貓咪咖啡店店長</h1>
        <p class="subtitle">一邊服務挑嘴貓客人，一邊把小小貓咖經營成街角明星店。</p>
      </div>
      <div class="hero-actions">
        <button id="restartBtn" class="secondary">重新開店</button>
      </div>
    </header>

    <main class="dashboard">
      <div class="col col-left">
        <div class="drawer-trigger-wrap">
          <button id="toggleLogBtn" class="drawer-btn">📖 查看經營日誌</button>
        </div>

        <section class="panel stats-panel">
          <div class="panel-title-row">
            <h2>店內狀態</h2>
            <span id="timerLabel" class="badge">08:00</span>
          </div>
          <div class="stats-grid" id="statsGrid"></div>
          <div class="progress-wrap">
            <div class="progress-labels">
              <span>今日人氣</span>
              <span id="goalLabel">0 / 120</span>
            </div>
            <div class="progress-bar">
              <div id="goalFill" class="progress-fill"></div>
            </div>
          </div>
        </section>
      </div>

      <div class="col col-center">
        <section class="panel action-panel">
          <div class="panel-title-row">
            <h2>吧台動作</h2>
            <span id="dayLabel" class="badge soft">Day 1</span>
          </div>
          <div class="actions-grid">
            <button class="action-btn" data-action="brew">
              <span>煮咖啡 +1</span>
              <div class="btn-progress"></div>
            </button>
            <button class="action-btn" data-action="bake">
              <span>烤魚麵包 +1</span>
              <div class="btn-progress"></div>
            </button>
            <button class="action-btn" data-action="pet">
              <span>摸店貓</span>
              <div class="btn-progress"></div>
            </button>
            <button class="action-btn" data-action="restock">
              <span>補貨</span>
              <div class="btn-progress"></div>
            </button>
            <button class="action-btn" data-action="promo">
              <span>發限時貼文</span>
              <div class="btn-progress"></div>
            </button>
            <button class="action-btn" data-action="nap">
              <span>偷睡 10 分鐘</span>
              <div class="btn-progress"></div>
            </button>
          </div>

          <div class="resident-cats" id="residentCats"></div>

          <div class="message-card" id="headlineCard">
            <p id="headlineText">先煮幾杯咖啡，別讓第一批客人失望。</p>
          </div>
        </section>
      </div>

      <div class="col col-right">
        <div class="drawer-trigger-wrap">
          <button id="toggleShopBtn" class="drawer-btn primary">🛒 設備商店</button>
        </div>

        <section class="panel orders-panel">
          <div class="panel-title-row">
            <h2>排隊中</h2>
            <span id="queueCount" class="badge warning">0 位</span>
          </div>
          <div id="ordersList" class="orders-list"></div>
        </section>
      </div>
    </main>

    <!-- 隱藏抽屜：日誌 -->
    <div id="logDrawer" class="drawer drawer-left hidden">
      <div class="drawer-content">
        <div class="drawer-header">
          <h2>經營日誌</h2>
          <button class="close-drawer">關閉</button>
        </div>
        <div id="logList" class="log-list"></div>
      </div>
    </div>

    <!-- 隱藏抽屜：商店 -->
    <div id="shopDrawer" class="drawer drawer-right hidden">
      <div class="drawer-content">
        <div class="drawer-header">
          <h2>設備商店</h2>
          <button class="close-drawer">關閉</button>
        </div>
        <div id="upgradesList" class="upgrades-list"></div>
      </div>
    </div>
  </div>

  <template id="orderCardTemplate">
    <article class="order-card slide-in">
      <div class="order-top">
        <div>
          <h3 class="order-name"></h3>
          <p class="order-quote"></p>
        </div>
      </div>
      <div class="patience-wrap">
        <div class="patience-bar"><div class="patience-fill"></div></div>
      </div>
      <div class="order-tags"></div>
      <button class="serve-btn">送餐</button>
    </article>
  </template>

  <div id="summaryModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2 id="summaryTitle">今日營業結算</h2>
      <div class="summary-stats" id="summaryStats"></div>
      <p id="summaryMessage"></p>
      <div class="modal-actions">
        <button id="nextDayBtn" class="action-btn">開始下一天</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
